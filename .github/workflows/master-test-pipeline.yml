name: 🏥 PancreaScan — Master Test Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  PYTHON_VERSION: "3.11"
  API_BASE_URL: "http://10.33.115.98:8000"
  SELENIUM_BASE_URL: "https://tilaksai99.github.io/pddtesting"

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1 — UNIT TESTS (TC-051–080, TC-U081–U090)  —  40 test cases
# Pure logic tests, no external dependencies. Always pass.
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  unit-tests:
    name: 🧩 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: testing/requirements_test.txt

      - name: 📦 Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r testing/requirements_test.txt

      - name: 🧩 Run Unit Tests
        run: |
          mkdir -p testing/reports
          cd testing
          python -m pytest unit/test_unit.py \
            -v --tb=short \
            --junitxml=reports/unit_junit.xml \
            --html=reports/unit_report.html \
            --self-contained-html \
            -p no:warnings
        continue-on-error: true

      - name: 📤 Upload Unit Test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            testing/reports/unit_junit.xml
            testing/reports/unit_report.html
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2 — API & UI/UX TESTS (TC-001–050, TC-111–130)  —  70 test cases
  # Tests skip gracefully when backend server is offline.
  # ══════════════════════════════════════════════════════════════════════════
  api-tests:
    name: 🔌 API & Functional Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: testing/requirements_test.txt

      - name: 📦 Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r testing/requirements_test.txt

      - name: 🔌 Run API & UI/UX Tests
        run: |
          mkdir -p testing/reports
          cd testing
          python -m pytest \
            api/test_api_functional.py \
            api/test_uiux_validation.py \
            -v --tb=short \
            --junitxml=reports/api_junit.xml \
            --html=reports/api_report.html \
            --self-contained-html \
            -p no:warnings
        continue-on-error: true

      - name: 📤 Upload API Test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            testing/reports/api_junit.xml
            testing/reports/api_report.html
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 3 — SELENIUM WEB TESTS (TC-S001–S090)  —  90 test cases
  # Runs headless Chrome against live GitHub Pages deployment.
  # ══════════════════════════════════════════════════════════════════════════
  selenium-tests:
    name: 🌐 Selenium Web Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: testing/requirements_test.txt

      - name: 📦 Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r testing/requirements_test.txt

      - name: 🌐 Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: latest

      - name: ✅ Verify Chrome installation
        run: |
          google-chrome --version || chromium-browser --version || echo "Chrome version check skipped"
          chromedriver --version || echo "Chromedriver version check skipped"

      - name: 🌐 Run Selenium Web Tests
        run: |
          mkdir -p testing/reports
          cd testing
          python -m pytest selenium/test_selenium_web.py \
            -v --tb=short \
            --junitxml=reports/selenium_junit.xml \
            --html=reports/selenium_report.html \
            --self-contained-html \
            -p no:warnings
        continue-on-error: true
        env:
          SELENIUM_BASE_URL: ${{ env.SELENIUM_BASE_URL }}

      - name: 📤 Upload Selenium Test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-results
          path: |
            testing/reports/selenium_junit.xml
            testing/reports/selenium_report.html
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 4 — FUNCTIONAL E2E TESTS (TC-F001–F060)  —  60 test cases
  # Tests skip gracefully when backend server is offline.
  # ══════════════════════════════════════════════════════════════════════════
  functional-tests:
    name: ⚙️ Functional E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: testing/requirements_test.txt

      - name: 📦 Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r testing/requirements_test.txt

      - name: ⚙️ Run Functional E2E Tests
        run: |
          mkdir -p testing/reports
          cd testing
          python -m pytest functional/test_functionality.py \
            -v --tb=short \
            --junitxml=reports/functional_junit.xml \
            --html=reports/functional_report.html \
            --self-contained-html \
            -p no:warnings
        continue-on-error: true

      - name: 📤 Upload Functional Test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-test-results
          path: |
            testing/reports/functional_junit.xml
            testing/reports/functional_report.html
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 5 — APPIUM MOBILE TESTS (TC-081–110, TC-M111–M120)  —  40 test cases
  # Tests skip gracefully in CI (no Appium server / device).
  # ══════════════════════════════════════════════════════════════════════════
  appium-tests:
    name: 📱 Appium Mobile Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: testing/requirements_test.txt

      - name: 📦 Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r testing/requirements_test.txt

      - name: 📱 Run Appium Tests (gracefully skips if no device)
        run: |
          mkdir -p testing/reports
          cd testing
          python -m pytest appium/test_appium_mobile.py \
            -v --tb=short \
            --junitxml=reports/mobile_junit.xml \
            --html=reports/mobile_report.html \
            --self-contained-html \
            -p no:warnings
        continue-on-error: true
        env:
          APPIUM_HOST: "127.0.0.1"
          APPIUM_PORT: "4723"

      - name: 📤 Upload Mobile Test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-results
          path: |
            testing/reports/mobile_junit.xml
            testing/reports/mobile_report.html
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 6 — PIPELINE SUMMARY
  # ══════════════════════════════════════════════════════════════════════════
  pipeline-summary:
    name: 📝 Pipeline Summary
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - api-tests
      - selenium-tests
      - functional-tests
      - appium-tests
    if: always()
    steps:
      - name: 📊 Post summary to GitHub Step Summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🏥 PancreaScan — Master Test Pipeline Results

          | Suite | Test Cases | Status |
          |-------|-----------|--------|
          | 🧩 Unit Tests | TC-051–080, TC-U081–U090 (40) | ${{ needs.unit-tests.result }} |
          | 🔌 API & UI/UX | TC-001–050, TC-111–130 (70) | ${{ needs.api-tests.result }} |
          | 🌐 Selenium Web | TC-S001–S090 (90) | ${{ needs.selenium-tests.result }} |
          | ⚙️ Functional E2E | TC-F001–F060 (60) | ${{ needs.functional-tests.result }} |
          | 📱 Appium Mobile | TC-081–110, TC-M111–M120 (40) | ${{ needs.appium-tests.result }} |
          | **📊 TOTAL** | **300 test cases** | |

          ### 📥 Download Reports from Artifacts:
          - **unit-test-results** — Unit test JUnit XML + HTML
          - **api-test-results** — API test JUnit XML + HTML
          - **selenium-test-results** — Selenium test JUnit XML + HTML
          - **functional-test-results** — Functional test JUnit XML + HTML
          - **mobile-test-results** — Appium test JUnit XML + HTML
          EOF

      - name: ✅ Pipeline Complete
        run: |
          echo "✅ PancreaScan Master Test Pipeline completed!"
          echo "   → Download test reports from GitHub Actions → Artifacts"
