name: 🔒 Security Review

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1 — Secret Scanning with Gitleaks
  # Detects API keys, tokens, passwords committed to the repo
  # ─────────────────────────────────────────────────────────────────
  gitleaks:
    name: 🔑 Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so Gitleaks can scan all commits

      - name: Run Gitleaks secret scan
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # report findings but don't block other jobs

      - name: Save Gitleaks exit code
        run: echo "GITLEAKS_EXIT=${{ steps.gitleaks.outcome }}" >> $GITHUB_ENV

      - name: Upload Gitleaks SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────
  # Job 2 — SAST with Semgrep
  # Static analysis: Python security, OWASP Top 10, JWT, JS patterns
  # ─────────────────────────────────────────────────────────────────
  semgrep:
    name: 🔎 SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep with security rulesets
        run: |
          semgrep scan \
            --config "p/python" \
            --config "p/javascript" \
            --config "p/owasp-top-ten" \
            --config "p/jwt" \
            --config "p/secrets" \
            --json \
            --output semgrep-results.json \
            . || true
          echo "Semgrep scan complete"

      - name: Upload Semgrep JSON results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  # Job 3 — Dependency CVE Scan with Trivy
  # Scans backend requirements.txt for known vulnerabilities
  # ─────────────────────────────────────────────────────────────────
  trivy:
    name: 📦 Dependency CVE Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan on backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "backend/"
          format: "json"
          output: "trivy-results.json"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "0"   # don't fail — report only

      - name: Upload Trivy JSON results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.json
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  # Job 4 — Python Dependency Audit with pip-audit
  # Finds packages with known CVEs in the Python dependency tree
  # ─────────────────────────────────────────────────────────────────
  pip-audit:
    name: 🐍 Python Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit backend Python dependencies
        run: |
          pip-audit \
            -r backend/requirements.txt \
            --format json \
            --output pip-audit-results.json \
            || true
          echo "pip-audit complete"

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  # Job 5 — Custom AI-Assisted Code Analysis + Final Report
  # Runs our custom security_analysis.py script that examines:
  #   - Missing auth checks on endpoints
  #   - Weak password hashing (SHA-256)
  #   - CORS wildcard configuration
  #   - Hardcoded credentials
  #   - Missing rate limiting
  #   - Potential IDOR patterns
  # Then merges ALL tool outputs into a single security-review.md
  # ─────────────────────────────────────────────────────────────────
  security-report:
    name: 📝 Generate Security Report
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep, trivy, pip-audit]
    if: always()   # run even if earlier jobs fail — always produce a report
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install report script dependencies
        run: pip install jinja2

      - name: Download all scan tool artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: scan-outputs/

      - name: Run custom security analysis on source code
        run: |
          python scripts/security_analysis.py \
            --backend-dir backend \
            --output scan-outputs/custom-analysis.json
        continue-on-error: true

      - name: Generate consolidated security report (Markdown)
        run: |
          mkdir -p "Vulnerability Test Results"
          python scripts/generate_security_report.py \
            --semgrep   scan-outputs/semgrep-results.json \
            --trivy     scan-outputs/trivy-results.json \
            --pip-audit scan-outputs/pip-audit-results.json \
            --custom    scan-outputs/custom-analysis.json \
            --output    "Vulnerability Test Results/security-review.md"

      - name: Upload consolidated security report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: "Vulnerability Test Results/"
          retention-days: 30

      - name: Publish security summary to GitHub Actions Step Summary
        if: always()
        run: |
          if [ -f "Vulnerability Test Results/security-review.md" ]; then
            cat "Vulnerability Test Results/security-review.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Security report not generated" >> $GITHUB_STEP_SUMMARY
          fi
